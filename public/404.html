<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect unknown paths to index.html while preserving SPA route info.
      // 1 segment is kept because this app is hosted as /rtsim-test/.
      const pathSegmentsToKeep = 1

      const { location } = window
      const newUrl =
        location.protocol +
        '//' +
        location.hostname +
        (location.port ? ':' + location.port : '') +
        location.pathname
          .split('/')
          .slice(0, 1 + pathSegmentsToKeep)
          .join('/') +
        '/?/' +
        location.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
        (location.search
          ? '&' + location.search.slice(1).replace(/&/g, '~and~')
          : '') +
        location.hash

      location.replace(newUrl)
    </script>
  </head>
  <body></body>
</html>
