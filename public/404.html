<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect unknown paths to index.html while preserving SPA route info.
      // 1 segment is kept because this app is hosted as /rtsim-test/.
      const pathSegmentsToKeep = 1;
      var l = window.location;
      var newUrl =
        l.protocol +
        '//' +
        l.hostname +
        (l.port ? ':' + l.port : '') +
        l.pathname
          .split('/')
          .slice(0, 1 + pathSegmentsToKeep)
          .join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
        (l.search
          ? '&' + l.search.slice(1).replace(/&/g, '~and~')
          : '') +
        l.hash;
      window.location.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
